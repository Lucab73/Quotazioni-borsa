<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Borsa Live</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-web-app-capable" content="yes">
<meta name="apple-web-app-status-bar-style" content="black-translucent">
<meta name="apple-web-app-title" content="Borsa Live">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f14;--card:#1a1a24;--card2:#20202e;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#ffffff;--muted:#7e7e8c;--accent:#7c6af7;
  --green:#22c97a;--red:#e8504a;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;user-select:none;-webkit-user-select:none;padding-bottom:100px;overflow-x:hidden}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 16px 10px 16px;position:sticky;top:0;background:var(--bg);z-index:90}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.header-actions{display:flex;gap:12px;align-items:center}
.btn-circle{width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;transition:transform 0.1s}
.btn-circle:active{transform:scale(0.92)}

/* Animazione Rotazione Icona */
.spin {
  display: inline-block !important;
  animation: ruota 1s linear infinite;
}
@keyframes ruota {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Info Bar */
.info-bar{padding:0 16px;margin-bottom:16px;display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}

/* List & Cards */
.list-container{padding:0 12px;display:flex;flex-direction:column;gap:10px}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:relative;touch-action:none;transition:box-shadow 0.2s,border-color 0.2s}
.stock-card.dragging{opacity:0.5;box-shadow:0 10px 20px rgba(0,0,0,0.4);border-color:var(--accent);z-index:100}
.stock-info{display:flex;flex-direction:column;gap:2px;max-width:55%;cursor:pointer}
.stock-symbol{font-family:'DM Mono',monospace;font-weight:500;font-size:15px;letter-spacing:-0.3px}
.stock-name{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-values{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.stock-price{font-family:'DM Mono',monospace;font-weight:500;font-size:16px}
.stock-change{font-size:12px;font-weight:600;padding:2px 8px;border-radius:6px;font-family:'DM Mono',monospace}
.stock-change.up{background:rgba(34,201,122,0.15);color:var(--green)}
.stock-change.down{background:rgba(232,80,74,0.15);color:var(--red)}

/* Toast UI */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card2);
  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  z-index: 9999;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  border: 1px solid var(--border2);
  pointer-events: none;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}
#toast.show {
  opacity: 1;
  visibility: visible;
}

/* Modals */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal.open{opacity:1;pointer-events:auto}
.modal-content{background:var(--bg);width:100%;border-radius:24px 24px 0 0;padding:24px 16px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.2s cubic-bezier(0.1, 1, 0.1, 1)}
.modal.open .modal-content{transform:translateY(0)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{font-size:18px;font-weight:700}

/* Search UI */
.search-input-wrapper{position:relative;margin-bottom:16px}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:15px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-results{display:flex;flex-direction:column;gap:8px}
.search-item{background:var(--card);padding:12px 16px;border-radius:12px;display:flex;justify-content:between;align-items:center;cursor:pointer;border:1px solid transparent}
.search-item:active{border-color:var(--accent)}

/* Cloudflare Sync UI */
.sync-row{display:flex;gap:8px;margin-bottom:16px}
.sync-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text);font-family:'DM Mono',monospace;outline:none}
.btn-action{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px 16px;font-weight:600;cursor:pointer}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.portfolio-item{background:var(--card);padding:12px;border-radius:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<div class="header">
  <h1>Borsa Live</h1>
  <div class="header-actions">
    <div class="btn-circle" onclick="openSyncModal()" title="Cloudflare Sync">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
    <div class="btn-circle" onclick="openSearchModal()" title="Aggiungi Titolo o ISIN">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </div>
    <div class="btn-circle" onclick="refresh()" title="Aggiorna">
      <svg id="refresh-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
      </svg>
    </div>
  </div>
</div>

<div class="info-bar">
  <span id="update-timer">Aggiornamento in --s</span>
  <span id="total-count">0 titoli</span>
</div>

<div class="list-container" id="stock-list"></div>

<div id="toast"></div>

<div id="searchModal" class="modal" onclick="if(event.target===this)closeSearchModal()">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Aggiungi Titolo o ISIN</h2>
      <div class="btn-circle" onclick="closeSearchModal()">&times;</div>
    </div>
    <div class="search-input-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="Cerca nome, ticker o inserisci ISIN..." oninput="handleSearch(this.value)">
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div id="syncModal" class="modal" onclick="if(event.target===this)closeSyncModal()">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Cloudflare Backup &amp; Sync</h2>
      <div class="btn-circle" onclick="closeSyncModal()">&times;</div>
    </div>
    <div style="margin-bottom:16px; font-size:13px; color:var(--muted)">
      Salva o sincronizza la tua lista sul cloud privato tramite Cloudflare Workers KV inserendo un PIN segreto.
    </div>
    <div class="sync-row">
      <input type="number" id="syncPin" class="sync-input" placeholder="Inserisci un PIN numerico (es: 1234)">
      <button class="btn-action" onclick="saveToCloud()">Salva su Cloud</button>
    </div>
    <div class="sync-row">
      <button class="btn-action btn-secondary" style="width:100%" onclick="loadPortfoliosFromCloud()">Cerca Backup su Cloud</button>
    </div>
    <div id="cloudPortfoliosList"></div>
  </div>
</div>

<script>
/* ---- CONFIGURAZIONE WORKER ---- */
// Inserisci qui l'URL completo del tuo Cloudflare Worker deployato
var workerUrl = ""; 

var tickers = localStorage.getItem('tickers') || 'RACE.MI,AAPL,BTC-USD';
var countdownSec = 60;
var timerInterval = null;

function initWorkerUI() {
  if(!workerUrl) {
    showToast("⚠️ Inserisci l'URL del tuo Worker all'inizio dello script");
  }
}

/* ---- LOGICA REFRESH ---- */
function refresh() {
  if(!workerUrl) return;
  
  var icon = document.getElementById('refresh-icon');
  if (icon) icon.classList.add('spin');
  
  if(!tickers.trim()) {
    document.getElementById('stock-list').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Nessun titolo monitorato.<br>Usa il tasto + per aggiungere titoli o codici ISIN.</div>';
    document.getElementById('total-count').textContent = '0 titoli';
    if (icon) icon.classList.remove('spin');
    return;
  }
  
  fetch(workerUrl + '?s=' + encodeURIComponent(tickers))
    .then(function(res){ return res.json(); })
    .then(function(data){
      if(data.error) {
        showToast('Errore: ' + data.error);
        return;
      }
      buildList(data);
      resetCountdown();
    })
    .catch(function(){
      showToast('⚠️ Errore di connessione di rete');
    })
    .finally(function(){
      if (icon) icon.classList.remove('spin');
    });
}

function buildList(list) {
  var container = document.getElementById('stock-list');
  container.innerHTML = '';
  
  if(!Array.isArray(list)) list = [list];
  
  list.forEach(function(item){
    if(!item || !item.symbol) return;
    
    var card = document.createElement('div');
    card.className = 'stock-card';
    card.dataset.id = item.symbol;
    
    var changeClass = item.changePercent >= 0 ? 'up' : 'down';
    var sign = item.changePercent >= 0 ? '+' : '';
    
    // Per le obbligazioni mostriamo 2 decimali standard (es. 100.45)
    var formattedPrice = item.price.toFixed(item.price < 2 ? 4 : 2);

    card.innerHTML = 
      '<div class="stock-info" onclick="confirmDelete(\''+item.symbol+'\')">' +
        '<div class="stock-symbol">'+item.symbol+'</div>' +
        '<div class="stock-name">'+(item.name || '')+'</div>' +
      '</div>' +
      '<div class="stock-values">' +
        '<div class="stock-price">'+formattedPrice+' '+item.currency+'</div>' +
        '<div class="stock-change '+changeClass+'">'+sign+item.changePercent.toFixed(2)+'%</div>' +
      '</div>';
      
    container.appendChild(card);
  });
  
  document.getElementById('total-count').textContent = list.length + (list.length === 1 ? ' titolo' : ' titoli');
  initDragAndDrop();
}

function confirmDelete(symbol) {
  if(confirm('Rimuovere ' + symbol + ' dalla lista?')) {
    var arr = tickers.split(',').filter(function(t){ return t !== symbol; });
    tickers = arr.join(',');
    localStorage.setItem('tickers', tickers);
    refresh();
    showToast('Rimosso ' + symbol);
  }
}

/* ---- TIMER COUNTDOWN ---- */
function resetCountdown() {
  clearInterval(timerInterval);
  countdownSec = 60;
  var el = document.getElementById('update-timer');
  el.textContent = 'Aggiornamento in ' + countdownSec + 's';
  
  timerInterval = setInterval(function(){
    countdownSec--;
    if(countdownSec <= 0) {
      refresh();
    } else {
      el.textContent = 'Aggiornamento in ' + countdownSec + 's';
    }
  }, 1000);
}

/* ---- RICERCA ED AGGIUNTA (DIRETTAMENTE ANCHE CON ISIN SCRITTO) ---- */
var searchTimeout = null;
function handleSearch(val) {
  clearTimeout(searchTimeout);
  var resultsDiv = document.getElementById('searchResults');
  
  if(!val.trim()) {
    resultsDiv.innerHTML = '';
    return;
  }

  // Se l'utente digita un codice ISIN puro (12 caratteri), mostriamo l'aggiunta diretta immediata
  var cleanVal = val.trim().toUpperCase();
  if (/^[A-Z]{2}[A-Z0-9]{10}$/.test(cleanVal)) {
    resultsDiv.innerHTML = 
      '<div class="search-item" onclick="addTicker(\''+cleanVal+'\')">' +
        '<div>' +
          '<div style="font-family:\'DM Mono\',monospace; font-weight:600; color:var(--accent)">+ Aggiungi Obbligazione / ISIN</div>' +
          '<div style="font-size:12px; color:var(--muted)">'+cleanVal+' (Cerca su Yahoo / Borsa Italiana)</div>' +
        '</div>' +
      '</div>';
    return;
  }

  if(!workerUrl) return;
  
  searchTimeout = setTimeout(function(){
    fetch(workerUrl + '?q=' + encodeURIComponent(val))
      .then(function(res){ return res.json(); })
      .then(function(data){
        resultsDiv.innerHTML = '';
        var quotes = data.quotes || [];
        
        if(quotes.length === 0) {
          resultsDiv.innerHTML = '<div style="text-align:center;padding:12px;color:var(--muted)">Nessun asset trovato. Se è un ISIN premi invio o completalo.</div>';
          return;
        }
        
        quotes.forEach(function(q){
          var item = document.createElement('div');
          item.className = 'search-item';
          item.innerHTML = 
            '<div>' +
              '<div style="font-family:\'DM Mono\',monospace; font-weight:500">'+q.symbol+'</div>' +
              '<div style="font-size:12px; color:var(--muted)">'+(q.shortname || q.longname || '')+'</div>' +
            '</div>' +
            '<div style="font-size:11px; padding:3px 6px; background:var(--border2); border-radius:4px; color:var(--muted)">'+(q.quoteType || '')+'</div>';
            
          item.onclick = function() {
            addTicker(q.symbol);
          };
          resultsDiv.appendChild(item);
        });
      }).catch(function(){});
  }, 300);
}

function addTicker(symbol) {
  var arr = tickers ? tickers.split(',').map(t => t.trim()).filter(t => t) : [];
  if(arr.indexOf(symbol) !== -1) {
    showToast('Titolo già presente in lista');
    return;
  }
  arr.push(symbol);
  tickers = arr.join(',');
  localStorage.setItem('tickers', tickers);
  closeSearchModal();
  refresh();
  showToast('✓ Aggiunto ' + symbol);
}

/* ---- BACKUP CLOUDFLARE KV ---- */
function saveToCloud() {
  var pin = document.getElementById('syncPin').value.trim();
  if(!pin || pin.length < 4) {
    showToast('Inserisci un PIN di almeno 4 cifre');
    return;
  }
  if(!workerUrl) return;

  var name = prompt("Assegna un nome a questo backup:", "Mio Portafoglio");
  if(!name) return;

  var payload = { id: 'p_' + Date.now(), name: name, pin: pin, tickers: tickers };

  fetch(workerUrl + '?action=save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    if(res.ok) showToast('✓ Salvato su Cloudflare KV!');
    else showToast('Errore nel salvataggio cloud');
  })
  .catch(function(){ showToast('Errore di rete durante il backup'); });
}

function loadPortfoliosFromCloud() {
  var pin = document.getElementById('syncPin').value.trim();
  if(!pin) {
    showToast('Inserisci il PIN per cercare i backup');
    return;
  }
  if(!workerUrl) return;

  fetch(workerUrl + '?action=list&pin=' + pin)
  .then(function(r){ return r.json(); })
  .then(function(res){
    var div = document.getElementById('cloudPortfoliosList');
    div.innerHTML = '';
    if(!res.ok || !res.portfolios || res.portfolios.length === 0) {
      div.innerHTML = '<div style="font-size:12px; color:var(--red); padding:8px 0">Nessun backup trovato per questo PIN</div>';
      return;
    }

    res.portfolios.forEach(function(p){
      var date = new Date(p.updatedAt).toLocaleString('it-IT', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
      var item = document.createElement('div');
      item.className = 'portfolio-item';
      item.innerHTML = 
        '<div>' +
          '<div style="font-weight:600; font-size:13px">'+p.name+'</div>' +
          '<div style="font-size:11px; color:var(--muted)">'+date+' • '+p.tickers.split(',').length+' titoli</div>' +
        '</div>' +
        '<button class="btn-action" style="padding:6px 12px; font-size:12px">Ripristina</button>';
      
      item.querySelector('button').onclick = function() {
        if(confirm('Sovrascrivere la lista corrente con il backup "' + p.name + '"?')) {
          tickers = p.tickers;
          localStorage.setItem('tickers', tickers);
          refresh();
          closeSyncModal();
          showToast('✓ Lista sincronizzata!');
        }
      };
      div.appendChild(item);
    });
  })
  .catch(function(){ showToast('Impossibile connettersi al cloud'); });
}

/* ---- CONF MODALI ---- */
function openSearchModal() {
  document.getElementById('searchModal').classList.add('open');
  document.getElementById('searchInput').focus();
}
function closeSearchModal() {
  document.getElementById('searchModal').classList.remove('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
}
function openSyncModal() { document.getElementById('syncModal').classList.add('open'); }
function closeSyncModal() {
  document.getElementById('syncModal').classList.remove('open');
  document.getElementById('cloudPortfoliosList').innerHTML = '';
}

/* ---- TOAST ENGINE ---- */
var _toastTimer = null;
function showToast(msg, duration) {
  duration = duration || 2500;
  var t = document.getElementById('toast');
  t.textContent = msg;
  
  t.classList.remove('show');
  void t.offsetHeight; 
  t.classList.add('show');
  
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { 
    t.classList.remove('show'); 
  }, duration);
}

/* ---- DRAG AND DROP ---- */
var dragEl = null;
function initDragAndDrop() {
  var list = document.getElementById('stock-list');
  var cards = list.querySelectorAll('.stock-card');
  
  cards.forEach(function(card){
    card.draggable = true;
    card.addEventListener('dragstart', handleDragStart);
    card.addEventListener('dragover', handleDragOver);
    card.addEventListener('dragend', handleDragEnd);
    card.addEventListener('touchstart', handleTouchStart, {passive:false});
    card.addEventListener('touchmove', handleTouchMove, {passive:false});
    card.addEventListener('touchend', handleTouchEnd);
  });
}

function handleDragStart(e) { dragEl = this; this.classList.add('dragging'); }
function handleDragOver(e) {
  if (e.preventDefault) e.preventDefault();
  if (this !== dragEl) {
    var list = document.getElementById('stock-list');
    var arr = Array.from(list.children);
    if(arr.indexOf(this) > arr.indexOf(dragEl)) list.insertBefore(dragEl, this.nextSibling);
    else list.insertBefore(dragEl, this);
  }
  return false;
}
function handleDragEnd() { this.classList.remove('dragging'); saveNewOrder(); }

var activeTouchEl = null;
function handleTouchStart(e) { activeTouchEl = this; this.classList.add('dragging'); }
function handleTouchMove(e) {
  if(!activeTouchEl) return;
  e.preventDefault();
  var target = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
  if(!target) return;
  var card = target.closest('.stock-card');
  if(card && card !== activeTouchEl) {
    var list = document.getElementById('stock-list');
    var arr = Array.from(list.children);
    if(arr.indexOf(card) > arr.indexOf(activeTouchEl)) list.insertBefore(activeTouchEl, card.nextSibling);
    else list.insertBefore(activeTouchEl, card);
  }
}
function handleTouchEnd() {
  if(activeTouchEl) {
    activeTouchEl.classList.remove('dragging');
    activeTouchEl = null;
    saveNewOrder();
  }
}

function saveNewOrder() {
  var list = document.getElementById('stock-list');
  var items = list.querySelectorAll('.stock-card');
  var newArr = [];
  items.forEach(function(item){ newArr.push(item.dataset.id); });
  tickers = newArr.join(',');
  localStorage.setItem('tickers', tickers);
}

/* ---- SERVICE WORKER ---- */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

/* ---- AVVIO ---- */
initWorkerUI();
refresh();
</script>
</body>
</html>
