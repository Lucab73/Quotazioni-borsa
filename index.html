<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Borsa Live</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Borsa Live">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f14;--card:#1a1a24;--card2:#20202e;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#f0f0f8;--muted:#6a6a82;--accent:#7c6af7;--accent2:#a594ff;
  --green:#22c97a;--red:#e8504a;
  --green-bg:rgba(34,201,122,0.12);--red-bg:rgba(232,80,74,0.12);
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--row-h:60px
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;touch-action:manipulation;
  overscroll-behavior:none;display:flex;flex-direction:column}

.header{display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 12px;padding-top:calc(16px + env(safe-area-inset-top));flex-shrink:0}
.header-left{display:flex;flex-direction:column;gap:2px}
.portfolio-title{font-size:20px;font-weight:700;letter-spacing:-.4px;cursor:pointer}
.portfolio-title:active{opacity:.7}
.header-sub{font-family:var(--mono);font-size:11px;color:var(--muted)}
.header-btns{display:flex;align-items:center;gap:14px}
.btn-hdr{background:none;border:none;cursor:pointer;color:var(--muted);
  padding:4px;transition:color .15s;display:flex;align-items:center;
  -webkit-tap-highlight-color:transparent}
.btn-hdr:active{color:var(--text)}
@media(hover:hover){ .btn-hdr:hover{color:var(--text)} }
.btn-hdr.editing{color:var(--accent2)}
.btn-hdr svg{width:20px;height:20px;transform-origin:center}
.btn-hdr.spinning{color:var(--accent2);pointer-events:none}
.btn-hdr.spinning svg{animation:spin .7s linear infinite}
.stock-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 8px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.stock-list::-webkit-scrollbar{display:none}
.footer-bar{flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:8px 18px calc(10px + env(safe-area-inset-bottom));
  border-top:1px solid var(--border)}
.countdown{font-family:var(--mono);font-size:10px;color:var(--muted)}
.footer-right{font-family:var(--mono);font-size:10px;color:var(--muted)}
.stock-row{display:flex;align-items:center;gap:13px;padding:9px 10px;
  border-radius:14px;min-height:var(--row-h);user-select:none;transition:background .12s}
.stock-row:active{background:var(--card)}
.stock-row.dragging{opacity:.35}
.stock-row.drag-over{background:rgba(124,106,247,0.1)}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;color:#fff}
.row-info{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25}
.row-sym{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:1px}
.row-price{text-align:right;flex-shrink:0}
.row-value{font-family:var(--mono);font-size:15px;font-weight:500;letter-spacing:-.02em;line-height:1.25}
.row-change{font-family:var(--mono);font-size:11px;margin-top:2px}
.row-change.pos{color:var(--green)}.row-change.neg{color:var(--red)}.row-change.flat{color:var(--muted)}
.drag-handle{display:none;color:var(--muted);font-size:18px;padding:4px;cursor:grab;flex-shrink:0;touch-action:none;align-items:center}
.drag-handle:active{cursor:grabbing}
.edit-mode .drag-handle{display:flex}
.btn-del{display:none;background:var(--red-bg);border:1px solid rgba(232,80,74,0.25);
  border-radius:8px;color:var(--red);font-size:11px;font-family:var(--mono);padding:5px 9px;cursor:pointer;flex-shrink:0}
.edit-mode .btn-del{display:block}
.skel-row{display:flex;align-items:center;gap:13px;padding:9px 10px;min-height:var(--row-h)}
.skel-av{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.07);flex-shrink:0;animation:sh 1.2s infinite}
.skel-info{flex:1}.skel-pr{text-align:right;flex-shrink:0}
.skel-ln{background:rgba(255,255,255,0.07);border-radius:4px;animation:sh 1.2s infinite}
@keyframes sh{0%,100%{opacity:.35}50%{opacity:.75}}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:50px 20px;text-align:center;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}
.overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.6);
  opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--card2);
  border-radius:22px 22px 0 0;padding:0 0 calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);
  max-height:92dvh;display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.sheet-title{font-size:16px;font-weight:700;padding:14px 18px 10px;flex-shrink:0}
.search-box{padding:0 18px 10px;flex-shrink:0;position:relative}
.search-icon{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.search-icon svg{width:16px;height:16px}
.sheet-input{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border2);
  border-radius:14px;padding:11px 14px 11px 40px;color:var(--text);font-family:var(--sans);font-size:15px;outline:none}
.sheet-input:focus{border-color:var(--accent)}
.sheet-input::placeholder{color:var(--muted)}
.search-results{flex-shrink:0;max-height:240px;overflow-y:auto;scrollbar-width:none;margin:0 10px}
.search-results::-webkit-scrollbar{display:none}
.result-row{display:flex;align-items:center;gap:12px;padding:10px;border-radius:12px;cursor:pointer;transition:background .12s}
.result-row:active{background:rgba(124,106,247,0.1)}
.result-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;color:#fff}
.result-info{flex:1;min-width:0}
.result-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-sym{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:1px}
.result-add{background:var(--accent);border:none;border-radius:8px;padding:5px 12px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.result-add.added{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,201,122,0.3)}
.search-hint{padding:10px 18px;font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center}
.search-loading{padding:14px;text-align:center}
.search-loading span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);animation:dot 1.2s infinite;margin:0 2px}
.search-loading span:nth-child(2){animation-delay:.2s}.search-loading span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.2}40%{opacity:1}}
.sheet-divider{height:1px;background:var(--border);margin:4px 18px 10px;flex-shrink:0}
.sheet-tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 18px 10px;gap:6px;flex-shrink:0}
.sheet-tabs::-webkit-scrollbar{display:none}
.stab{background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:20px;padding:5px 13px;
  font-family:var(--mono);font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.stab.active{background:rgba(124,106,247,0.18);border-color:var(--accent);color:var(--accent2)}
.sheet-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 8px;overflow-y:auto;flex:1;scrollbar-width:none;align-content:flex-start}
.sheet-chips::-webkit-scrollbar{display:none}
.chip{background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:20px;padding:5px 13px;
  font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:active{border-color:var(--accent);color:var(--accent2)}
.chip.added{border-color:rgba(34,201,122,0.4);color:var(--green)}
.pf-scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:0 18px}
.pf-scroll::-webkit-scrollbar{display:none}
.pf-section-title{font-family:var(--mono);font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;margin:14px 0 8px}
.pf-input-row{display:flex;gap:8px;margin-bottom:8px}
.pf-input{flex:1;background:rgba(255,255,255,0.07);border:1px solid var(--border2);border-radius:10px;
  padding:10px 13px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;min-width:0}
.pf-input:focus{border-color:var(--accent)}
.pf-input::placeholder{color:var(--muted);font-size:13px}
.btn-pf{background:var(--accent);border:none;border-radius:10px;padding:10px 16px;
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-pf.sec{background:rgba(255,255,255,0.08);color:var(--text)}
.pf-sep{height:1px;background:var(--border);margin:14px 0}
.pf-hint{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;padding:20px 0}
.pf-card{background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:14px;
  padding:12px 14px;margin-bottom:8px;transition:border-color .15s}
.pf-card.active-pf{border-color:var(--green)}
.pf-card-top{display:flex;align-items:center;gap:10px}
.pf-card-icon{font-size:24px;flex-shrink:0}
.pf-card-info{flex:1;min-width:0;cursor:pointer}
.pf-card-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pf-card-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
.pf-card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.pf-badge{font-family:var(--mono);font-size:10px;background:var(--green-bg);
  color:var(--green);border-radius:6px;padding:2px 8px}
.btn-pf-sm{background:none;border:1px solid var(--border2);border-radius:8px;
  padding:5px 10px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s}
.btn-pf-sm:active{background:rgba(255,255,255,0.08)}
.btn-pf-sm.danger{color:var(--red);border-color:rgba(232,80,74,0.25)}
.pin-display{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);transition:all .2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 20px}
.num-btn{background:rgba(255,255,255,0.07);border:none;border-radius:14px;padding:16px;
  font-size:20px;font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;font-family:var(--mono)}
.num-btn:active{background:rgba(255,255,255,0.2);transform:scale(.95)}
.num-btn.del{font-size:16px}
.num-btn.empty{background:none;cursor:default}
.worker-setup{padding:10px 18px 12px;flex-shrink:0}
.worker-setup p{font-family:var(--mono);font-size:11px;color:var(--red);line-height:1.7;margin-bottom:8px}
.worker-setup a{color:var(--accent2)}
.worker-setup code{background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:3px}
.worker-row{display:flex;gap:8px}
.worker-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(232,80,74,0.4);
  border-radius:10px;padding:9px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;min-width:0}
.worker-input:focus{border-color:var(--accent)}
.worker-btn{background:var(--accent);border:none;border-radius:10px;padding:9px 14px;
  color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.inst-modal{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;
  background:rgba(0,0,0,0.6);opacity:0;pointer-events:none;transition:opacity .3s}
.inst-modal.open{opacity:1;pointer-events:all}
.inst-box{background:var(--card2);border-radius:22px 22px 0 0;
  padding:20px 22px calc(28px + env(safe-area-inset-bottom));width:100%}
.inst-box h3{font-size:17px;font-weight:700;margin-bottom:6px}
.inst-box p{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px}
.inst-steps{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.inst-step{display:flex;align-items:center;gap:12px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-text{font-size:13px;line-height:1.4}
.step-text strong{color:var(--text)}.step-text span{color:var(--muted)}
.inst-actions{display:flex;gap:10px}
.btn-inst-p{flex:1;background:var(--accent);border:none;border-radius:12px;padding:13px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn-inst-s{background:rgba(255,255,255,0.07);border:1px solid var(--border2);border-radius:12px;padding:13px 18px;color:var(--muted);font-size:14px;cursor:pointer}
.detail-panel{position:fixed;inset:0;z-index:80;display:flex;flex-direction:column;
  background:var(--bg);transform:translateX(100%);transition:transform .32s cubic-bezier(.32,.72,0,1)}
.detail-panel.open{transform:translateX(0)}
.dp-header{display:flex;align-items:center;gap:12px;
  padding:16px 18px 14px;padding-top:calc(16px + env(safe-area-inset-top));
  border-bottom:1px solid var(--border);flex-shrink:0}
.dp-back{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0}
.dp-back:active{color:var(--text)}
.dp-title{flex:1}
.dp-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-sym{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:1px}
.dp-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.dp-body{flex:1;overflow-y:auto;padding:18px;scrollbar-width:none}
.dp-body::-webkit-scrollbar{display:none}
.dp-price-block{text-align:center;padding:20px 0 24px}
.dp-price{font-family:var(--mono);font-size:38px;font-weight:500;letter-spacing:-.03em;line-height:1}
.dp-change{font-family:var(--mono);font-size:14px;margin-top:6px}
.dp-change.pos{color:var(--green)}.dp-change.neg{color:var(--red)}.dp-change.flat{color:var(--muted)}
.dp-currency{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.dp-cell{background:var(--card);border-radius:12px;padding:12px 14px}
.dp-cell-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.dp-cell-value{font-family:var(--mono);font-size:15px;font-weight:500}
.dp-cell-value.pos{color:var(--green)}.dp-cell-value.neg{color:var(--red)}
.dp-section-title{font-family:var(--mono);font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.dp-carico-box{background:var(--card);border-radius:14px;padding:16px;margin-bottom:16px}
.dp-carico-row{display:flex;gap:10px;margin-bottom:10px}
.dp-carico-input{flex:1;background:rgba(255,255,255,0.07);border:1px solid var(--border2);
  border-radius:10px;padding:10px 13px;color:var(--text);font-family:var(--mono);
  font-size:15px;outline:none;min-width:0}
.dp-carico-input:focus{border-color:var(--accent)}
.dp-carico-input::placeholder{color:var(--muted);font-size:13px}
.dp-carico-label{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px}
.btn-dp{background:var(--accent);border:none;border-radius:10px;padding:10px 16px;
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-dp.sec{background:rgba(255,255,255,0.08);color:var(--muted)}
.dp-pnl{background:var(--card);border-radius:14px;padding:16px;margin-bottom:16px}
.dp-pnl-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;
  border-bottom:1px solid var(--border)}
.dp-pnl-row:last-child{border-bottom:none}
.dp-pnl-label{font-family:var(--mono);font-size:12px;color:var(--muted)}
.dp-pnl-value{font-family:var(--mono);font-size:13px;font-weight:500}
.dp-pnl-value.pos{color:var(--green)}.dp-pnl-value.neg{color:var(--red)}
.btn-dp-remove{width:100%;background:var(--red-bg);border:1px solid rgba(232,80,74,0.25);
  border-radius:12px;padding:12px;color:var(--red);font-family:var(--mono);
  font-size:13px;cursor:pointer;margin-top:8px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#222233;border:1px solid var(--border2);border-radius:10px;padding:9px 18px;
  font-family:var(--mono);font-size:12px;color:var(--text);
  opacity:0; transition:transform .3s, opacity .3s;
  z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0); opacity:1}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="portfolio-title" id="portfolioTitle" onclick="openPortfolioSheet()">My Portfolio</span>
    <span class="header-sub" id="headerSub">—</span>
  </div>
  <div class="header-btns">
    <button class="btn-hdr" id="refreshBtn" onclick="refreshAll()" title="Aggiorna">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <button class="btn-hdr" id="editBtn" onclick="toggleEdit()" title="Modifica">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <button class="btn-hdr" id="installBtn" onclick="handleInstall()" title="Installa app">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="btn-hdr" onclick="openAddSheet()" title="Aggiungi titolo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
</div>

<div class="stock-list" id="stockList"></div>

<div class="footer-bar">
  <span class="countdown" id="countdown"></span>
  <span class="footer-right" id="footerMeta"></span>
</div>

<div class="overlay" id="overlay" onclick="closeAllSheets()"></div>

<div class="sheet" id="addSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Aggiungi titolo</div>
  <div class="worker-setup" id="workerSetup">
    <p>⚠ Configura il proxy su <a href="https://workers.cloudflare.com" target="_blank">Cloudflare Workers</a> con <code>worker.js</code>:</p>
